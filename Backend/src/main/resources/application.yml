# Server Configuration
server:
  port: 8080

# Spring Configuration
spring:
  application:
    name: biryani-pos-backend
  
  # Database Configuration
  datasource:
    url: jdbc:h2:file:./data/posdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  # JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  
  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

# Application Specific Properties (Mapped to AppProperties)
