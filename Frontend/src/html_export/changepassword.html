<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Change Password - Offline PoS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cp-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    }

    .cp-card {
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }

    .cp-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .cp-logo {
      font-size: 3rem;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="cp-container animate-fadeIn">
    <div class="card cp-card">
      <div class="cp-header">
        <div class="cp-logo">🔐</div>
        <h2>Change Password</h2>
        <p class="text-muted text-sm">Secure your account</p>
      </div>

      <form action="index.html">
        <div class="form-group" style="margin-bottom: 20px">
          <label class="form-label"
            style="display: block; margin-bottom: 8px; font-size: 0.875rem; color: var(--text-secondary)">Current
            Password</label>
          <input type="password" class="input" placeholder="••••••••">
        </div>

        <div class="form-group" style="margin-bottom: 20px">
          <label class="form-label"
            style="display: block; margin-bottom: 8px; font-size: 0.875rem; color: var(--text-secondary)">New
            Password</label>
          <input type="password" class="input" placeholder="New secure password">
        </div>

        <div class="form-group" style="margin-bottom: 30px">
          <label class="form-label"
            style="display: block; margin-bottom: 8px; font-size: 0.875rem; color: var(--text-secondary)">Confirm New
            Password</label>
          <input type="password" class="input" placeholder="Confirm password">
        </div>

        <div class="flex gap-4">
          <a href="index.html" class="btn btn-outline" style="flex: 1">Cancel</a>
          <button type="submit" class="btn btn-primary" style="flex: 1">Update</button>
        </div>
      </form>
    </div>
  </div>
</body>

</html>
