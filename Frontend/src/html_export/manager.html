<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Manager Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside
      style="width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--glass-border); padding: 20px; display: flex; flex-direction: column;">
      <h2 style="margin-bottom: 40px">📊 Manager</h2>
      <nav class="flex-col gap-4">
        <a href="#" class="btn btn-primary" style="justify-content: flex-start">Dashboard</a>
        <a href="#" class="btn btn-outline" style="justify-content: flex-start; border: none">Menu Items</a>
        <a href="#" class="btn btn-outline" style="justify-content: flex-start; border: none">Sales Report</a>
        <a href="#" class="btn btn-outline" style="justify-content: flex-start; border: none">Users</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main style="flex: 1; padding: 40px; overflow-y: auto">
      <h1 style="margin-bottom: 30px">Dashboard Overview</h1>

      <div class="dashboard-grid">
        <div class="stat-card">
          <div class="stat-label">Today's Revenue</div>
          <div class="stat-value" style="color: var(--success)">₹12,450</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Orders</div>
          <div class="stat-value">48</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Tables</div>
          <div class="stat-value" style="color: var(--primary)">5/12</div>
        </div>
      </div>

      <div class="card">
        <h3>Recent Sales</h3>
        <table style="width: 100%; border-collapse: collapse; margin-top: 20px">
          <thead>
            <tr style="text-align: left; border-bottom: 1px solid var(--glass-border)">
              <th style="padding: 12px">Order ID</th>
              <th>Time</th>
              <th>Total</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr style="border-bottom: 1px solid rgba(255,255,255,0.05)">
              <td style="padding: 12px">#105</td>
              <td>12:30 PM</td>
              <td>₹450</td>
              <td style="color: var(--success)">PAID</td>
            </tr>
            <tr style="border-bottom: 1px solid rgba(255,255,255,0.05)">
              <td style="padding: 12px">#106</td>
              <td>12:35 PM</td>
              <td>₹890</td>
              <td style="color: var(--warning)">KITCHEN</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</body>

</html>
