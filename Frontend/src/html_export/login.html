<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Offline PoS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-logo {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
  </style>
</head>

<body>
  <div class="login-container animate-fadeIn">
    <div class="card login-card">
      <div class="login-header">
        <div class="login-logo">🔐</div>
        <h2>Welcome Back</h2>
        <p class="text-muted text-sm">Sign in to continue</p>
      </div>

      <form action="index.html">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="input" placeholder="Enter username" value="admin">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="input" placeholder="••••••••" value="password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%">Sign In</button>
      </form>

      <div class="text-center" style="margin-top: 20px">
        <a href="#" class="text-sm text-muted">Forgot Password?</a>
      </div>
    </div>
  </div>
</body>

</html>
